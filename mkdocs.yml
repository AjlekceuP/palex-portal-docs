site_name: Palex Backend API
site_description: Backend API documentation

theme:
    name: material
    features:
        - navigation.instant
        - navigation.expand
        - navigation.sections
        - navigation.indexes
        - toc.follow
        - search.suggest
        - search.highlight

docs_dir: docs

nav:
    - Home: index.md

    - Admin:
          - Orders:
                - Orders: admin/orders.md
                - Order Files: admin/order-files.md
                - Order Messages: admin/order-messages.md
                - Order Language Pairs: admin/order-language-pairs.md
          - Users:
                - Users: admin/users.md
                - Groups: admin/groups.md
          - Statuses: admin/statuses.md
          - Languages: admin/languages.md
          - Translations: admin/translations.md
    - Integrations:
          - Events: integrations/events.md
